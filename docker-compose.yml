version: "3.8"

services:
  chatbot-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: deligo-chatbot-server
    ports:
      - "8005:8005"
    environment:
      - HOST=0.0.0.0
      - PORT=8005
      - DEBUG=false
      - MONGODB_URI=${MONGODB_URI:-mongodb://host.docker.internal:27017}
      - MONGODB_DB_NAME=${MONGODB_DB_NAME:-deligo}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-1.5-flash}
      - GEMINI_EMBEDDING_MODEL=${GEMINI_EMBEDDING_MODEL:-models/text-embedding-004}
      - CHROMA_PERSIST_DIR=/app/chroma_db
      - CHROMA_COLLECTION_NAME=${CHROMA_COLLECTION_NAME:-deligo_policies}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000}
    volumes:
      - chatbot_vectorstore:/app/chroma_db
      - chatbot_logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8005/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - deligo-network

volumes:
  chatbot_vectorstore:
    name: deligo-chatbot-vectorstore
  chatbot_logs:
    name: deligo-chatbot-logs

networks:
  deligo-network:
    external: true
    name: deligo-network
